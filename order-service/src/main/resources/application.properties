spring.application.name=order-service
server.port=${PORT:8083}

# Database Config
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:pizzastore}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka Config
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.enabled=${EUREKA_ENABLED:true}

# Inter-service URLs
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}
payment.service.url=${PAYMENT_SERVICE_URL:http://localhost:8085}
user.service.url=${USER_SERVICE_URL:http://localhost:8081}